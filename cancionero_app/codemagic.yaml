workflows:
  android-workflow:
    name: Android APK Debug
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: |
          cd cancionero_app
          flutter pub get
      - name: Build APK
        script: |
          cd cancionero_app
          flutter build apk --debug
    artifacts:
      - cancionero_app/build/app/outputs/flutter-apk/app-debug.apk
