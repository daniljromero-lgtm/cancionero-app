name: Android Build

on:
  push:
    branches: [ main, principal ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get
        working-directory: cancionero_app

      - name: Build APK
        run: flutter build apk
        working-directory: cancionero_app

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-cancionero-apk
          path: cancionero_app/build/app/outputs/flutter-apk/*.apk
