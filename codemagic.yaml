workflows:
  android-workflow:
    name: Android APK Debug
    max_build_duration: 60
    environment:
      flutter: stable
    working_directory: cancionero_app
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug
      - name: Find and copy APK
        script: |
          APK=$(find . -name "app-debug.apk" | head -1)
          echo "APK encontrado en: $APK"
          cp "$APK" /Users/builder/clone/app-debug.apk
    artifacts:
      - /Users/builder/clone/app-debug.apk
