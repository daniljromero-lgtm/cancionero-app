workflows:
  android-workflow:
    name: Android APK Debug
    max_build_duration: 60
    environment:
      flutter: stable
    working_directory: cancionero_app
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: |
          flutter build apk --debug
          echo "=== APK generado ==="
          find . -name "*.apk" -type f
      - name: Copy APK
        script: |
          mkdir -p /tmp/artifacts
          find cancionero_app -name "*.apk" -type f -exec cp {} /tmp/artifacts/ \;
          ls /tmp/artifacts/
    artifacts:
      - /tmp/artifacts/*.apk
