workflows:
  android-workflow:
    name: Android APK Debug
    max_build_duration: 60
    environment:
      flutter: stable
    working_directory: cancionero_app
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug --output-dir=/Users/builder/clone/output
      - name: List output
        script: find /Users/builder/clone -name "*.apk" 2>/dev/null || echo "No APK found"
    artifacts:
      - /Users/builder/clone/output/*.apk
