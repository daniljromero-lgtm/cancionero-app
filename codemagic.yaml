workflows:
  android-workflow:
    name: Android APK Debug
    max_build_duration: 60
    environment:
      flutter: stable
    working_directory: cancionero_app
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: |
          flutter build apk --debug
          echo "=== Buscando APK ==="
          find /Users/builder/clone -name "*.apk" 2>/dev/null
          find $HOME -name "*.apk" 2>/dev/null
    artifacts:
      - "**/*.apk"
