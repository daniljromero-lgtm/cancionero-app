workflows:
  android-workflow:
    name: Android APK Debug
    max_build_duration: 60
    environment:
      flutter: stable
    working_directory: cancionero_app
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK with Gradle
        script: |
          cd android
          ./gradlew assembleDebug
      - name: Find APK location
        script: find /Users/builder/clone -name "*.apk" 2>/dev/null
    artifacts:
      - cancionero_app/android/app/build/outputs/apk/debug/*.apk
